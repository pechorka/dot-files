# Incus preseed — applied via: cat preseed.yaml | incus admin init --preseed
# Bridge IP (10.50.0.1) must match resolved-incus-dns.conf
config: {}

networks:
  - name: incusbr0
    type: bridge
    config:
      ipv4.address: 10.50.0.1/24
      ipv4.nat: "true"
      ipv4.dhcp: "true"
      dns.domain: incus
      dns.mode: managed

storage_pools:
  - name: default
    driver: btrfs
    config:
      source: /var/lib/incus/storage-pools/default

profiles:
  - name: default
    config:
      limits.memory: 4GB
    devices:
      root:
        path: /
        pool: default
        type: disk
        size: 50GB
      eth0:
        name: eth0
        network: incusbr0
        type: nic
        security.port_isolation: "true"
